name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Build and start Docker Compose services
        run: |
          docker compose build
          docker compose up -d

      - name: Wait for API to become healthy
        run: |
          for i in {1..30}; do
            if curl -fsS -X POST -H "Content-Type: application/json" -d '{"role":"ci"}' http://localhost:3000/auth/token; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down -v
