name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and run tests inside Docker Compose
        run: |
          # Build services and run the 'test' service (will depend on mongo)
          docker compose up --build --exit-code-from test test

      - name: Tear down Docker Compose
        if: always()
        run: docker compose down -v

